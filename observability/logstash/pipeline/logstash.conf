input {
  # Réception des logs via GELF (Graylog Extended Log Format)
  # C'est le driver utilisé par vos conteneurs frontend et backend
  gelf {
    port => 12201
    use_udp => true
    # Ajout de métadonnées pour identifier la source
    add_field => { "[@metadata][source]" => "docker" }
  }
}

filter {
  # Parsing facultatif du message pour extraire des champs spécifiques
  # Cela permet de structurer les logs JSON pour une meilleure analyse
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed_message"
    }
  }
  
  # Ajout de champs utiles pour l'analyse
  # extraction du nom du conteneur (ex: "microcrm-front") depuis le tag
  if [tag] {
    mutate {
      # nettoie le tag (ex: "microcrm-front" devient "front")
      gsub => ["tag", "microcrm-", ""]
      # renomme le champ tag en container_name
      rename => { "tag" => "container_name" }
    }
  }
  
  # Définition du niveau de log par défaut si absent
  if ![level] {
    mutate {
      add_field => { "level" => "info" }
    }
  }
}

output {
  # Envoi vers Elasticsearch
  # L'index sera créé automatiquement avec le pattern "microcrm-logs-YYYY.MM.dd"
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microcrm-logs-%{+YYYY.MM.dd}"
    # Gestion des erreurs d'indexation
    retry_on_conflict => 3
  }
  
  # Affichage dans la console pour debug (optionnel, peut être retiré en prod)
  stdout { codec => rubydebug }
}