input {
  # 1. Logs applicatifs via GELF
  gelf {
    port => 12201
    use_udp => true
    add_field => { "[@metadata][source]" => "docker" }
  }

  # 2. GitHub Actions (DORA Metrics)
  http_poller {
    urls => {
      front_runs => {
        method => get
        url => "https://api.github.com/repos/mathador/p9_microcrm_front/actions/runs"
        headers => {
          Accept => "application/vnd.github+json"
          Authorization => "Bearer ${GITHUB_TOKEN}"
        }
      }
      back_runs => {
        method => get
        url => "https://api.github.com/repos/mathador/p9_microcrm_back/actions/runs"
        headers => {
          Accept => "application/vnd.github+json"
          Authorization => "Bearer ${GITHUB_TOKEN}"
        }
      }
    }
    schedule => { "every" => "1h" }
    codec => "json"
    add_field => { "[@metadata][source]" => "github" }
  }

  # 3. SonarQube Cloud (Dette technique)
  http_poller {
    urls => {
      front_sonar => {
        method => get
        url => "https://sonarcloud.io/api/measures/component?component=mathador_p9_microcrm_front&metricKeys=sqale_index,reliability_rating,security_rating,sqale_rating"
        headers => { Authorization => "Bearer ${SONAR_TOKEN}" }
      }
      back_sonar => {
        method => get
        url => "https://sonarcloud.io/api/measures/component?component=mathador_p9_microcrm_back&metricKeys=sqale_index,reliability_rating,security_rating,sqale_rating"
        headers => { Authorization => "Bearer ${SONAR_TOKEN}" }
      }
    }
    schedule => { "every" => "1h" }
    codec => "json"
    add_field => { "[@metadata][source]" => "sonar" }
  }
}

filter {
  # --- TRAITEMENT GITHUB ---
  if [@metadata][source] == "github" {
    split { 
      field => "workflow_runs" 
    }
    
    mutate {
      add_field => {
        "repository" => "%{[workflow_runs][repository][name]}"
        "status" => "%{[workflow_runs][status]}"
        "conclusion" => "%{[workflow_runs][conclusion]}"
        "created_at" => "%{[workflow_runs][created_at]}"
        "updated_at" => "%{[workflow_runs][updated_at]}"
        "run_name" => "%{[workflow_runs][name]}"
        "type" => "github_workflow_run"
      }
    }

    ruby {
      code => '
        require "time"
        created = event.get("created_at")
        updated = event.get("updated_at")

        if created && updated
          t1 = Time.parse(created)
          t2 = Time.parse(updated)
          diff = (t2 - t1).to_i
          
          event.set("duration_seconds", diff)

          hours = diff / 3600
          minutes = (diff % 3600) / 60
          seconds = diff % 60
          human_time = hours.to_s + "h " + minutes.to_s + "m " + seconds.to_s + "s"
          event.set("lead_time_for_changes_human", human_time)
        end
      '
    }

    date { 
      match => [ "created_at", "ISO8601" ]
      target => "@timestamp" 
    }
    
    mutate { 
      remove_field => ["workflow_runs", "http_poller_metadata"] 
    }
  }

  # --- TRAITEMENT SONAR ---
  if [@metadata][source] == "sonar" {
    mutate {
      add_field => {
        "repository" => "%{[component][name]}"
        "type" => "sonar_metrics"
      }
    }
    
    split { 
      field => "[component][measures]" 
    }
    
    mutate {
      add_field => { "%{[component][measures][metric]}" => "%{[component][measures][value]}" }
    }
    
    if [sqale_index] {
      ruby {
        code => "event.set('technical_debt_hours', event.get('sqale_index').to_f / 60.0)"
      }
    }
  }

  # --- TRAITEMENT LOGS DOCKER ---
  if [@metadata][source] == "docker" {
    if [message] =~ /^\{.*\}$/ {
      json { 
        source => "message"
        target => "parsed_message" 
      }
    }
    
    if [level] =~ /(error|err|ERROR|critical)/ or [parsed_message][level] =~ /(error|err|ERROR)/ {
      mutate { add_field => { "is_error" => 1 } }
    } else {
      mutate { add_field => { "is_error" => 0 } }
    }
    
    mutate {
      gsub => ["tag", "microcrm-", ""]
      rename => { "tag" => "container_name" }
    }
  }
}

output {
  if [@metadata][source] == "github" {
    elasticsearch { 
      hosts => ["http://elasticsearch:9200"] 
      index => "dora-metrics-%{+YYYY.MM.dd}" 
    }
  } else if [@metadata][source] == "sonar" {
    elasticsearch { 
      hosts => ["http://elasticsearch:9200"] 
      index => "sonar-metrics-%{+YYYY.MM.dd}" 
    }
  } else {
    elasticsearch { 
      hosts => ["http://elasticsearch:9200"] 
      index => "microcrm-logs-%{+YYYY.MM.dd}" 
    }
  }
  stdout { codec => rubydebug }
}