input {
  # Réception des logs via GELF
  gelf {
    port => 12201
    use_udp => true
    add_field => { "[@metadata][source]" => "docker" }
  }

  # Récupération des données GitHub Actions pour les métriques DORA
  http_poller {
    urls => {
      front_runs => {
        method => get
        url => "https://api.github.com/repos/mathador/p9_microcrm_front/actions/runs"
        headers => {
          Accept => "application/vnd.github+json"
          Authorization => "Bearer ${GITHUB_TOKEN}"
        }
      }
      back_runs => {
        method => get
        url => "https://api.github.com/repos/mathador/p9_microcrm_back/actions/runs"
        headers => {
          Accept => "application/vnd.github+json"
          Authorization => "Bearer ${GITHUB_TOKEN}"
        }
      }
    }
    request_timeout => 60
    # Interrogation toutes les heures
    schedule => { "every" => "1h" }
    codec => "json"
    metadata_target => "http_poller_metadata"
    add_field => { "[@metadata][source]" => "github" }
  }
}

filter {
  if [@metadata][source] == "github" {
    # On éclate la liste des workflow_runs reçue de l'API
    split {
      field => "workflow_runs"
    }

    mutate {
      add_field => {
        "repository" => "%{[workflow_runs][repository][name]}"
        "status" => "%{[workflow_runs][status]}"
        "conclusion" => "%{[workflow_runs][conclusion]}"
        "created_at" => "%{[workflow_runs][created_at]}"
        "updated_at" => "%{[workflow_runs][updated_at]}"
        "run_id" => "%{[workflow_runs][id]}"
        "type" => "github_workflow_run"
      }
      remove_field => ["workflow_runs", "http_poller_metadata"]
    }

    # Conversion des dates
    date {
      match => [ "created_at", "ISO8601" ]
      target => "created_at"
    }
    date {
      match => [ "updated_at", "ISO8601" ]
      target => "updated_at"
    }

    # Calcul de la durée du déploiement (Lead Time for Changes)
    ruby {
      code => "event.set('duration_seconds', event.get('updated_at').to_f - event.get('created_at').to_f)"
    }
  } else if [@metadata][source] == "docker" {
    # Parsing facultatif du message pour extraire des champs spécifiques
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
        target => "parsed_message"
      }
    }
    
    if [tag] {
      mutate {
        gsub => ["tag", "microcrm-", ""]
        rename => { "tag" => "container_name" }
      }
    }
    
    if ![level] {
      mutate {
        add_field => { "level" => "info" }
      }
    }
  }
}

output {
  if [@metadata][source] == "github" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "dora-metrics-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "microcrm-logs-%{+YYYY.MM.dd}"
      retry_on_conflict => 3
    }
  }
  
  stdout { codec => rubydebug }
}